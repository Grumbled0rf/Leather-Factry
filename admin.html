<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EBL — Content Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --accent: #C9A456; --bg: #0B0B0B; --surface: #141414; --border: #222; --text: #F7F2EA; --muted: #999; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
    .admin-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .admin-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.1em; color: var(--accent); }
    .admin-header .actions { display: flex; gap: 12px; }
    .btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s; }
    .btn-save { background: var(--accent); color: #080808; }
    .btn-save:hover { background: #D4AF6A; }
    .btn-reset { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-reset:hover { border-color: #f44; color: #f44; }
    .btn-preview { background: transparent; color: var(--accent); border: 1px solid rgba(201,164,86,0.3); }
    .btn-preview:hover { background: rgba(201,164,86,0.1); }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px 120px; }
    .section-group { margin-bottom: 48px; }
    .section-group h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input, .field textarea, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.3s; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { min-height: 100px; resize: vertical; }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #080808; padding: 14px 28px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .status-dot.saved { background: #25D366; }
    .status-dot.unsaved { background: #f44; }
    @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } .admin-header { padding: 16px; flex-wrap: wrap; gap: 12px; } }
  </style>
</head>
<body>

<div class="admin-header">
  <h1><span class="status-dot saved" id="statusDot"></span>EBL Content Manager</h1>
  <div class="actions">
    <button class="btn btn-preview" onclick="window.open('index.html','_blank')">Preview Site</button>
    <button class="btn btn-reset" onclick="resetAll()">Reset to Default</button>
    <button class="btn btn-save" onclick="saveAll()">Save Changes</button>
  </div>
</div>

<div class="container">

  <!-- Hero Section -->
  <div class="section-group">
    <h2>Hero Section</h2>
    <div class="field">
      <label>Headline</label>
      <input type="text" id="heroH1" placeholder="Born from the spirit of the Emirates." />
    </div>
    <div class="field">
      <label>Subtitle</label>
      <textarea id="heroSub" placeholder="A quiet rebellion against the disposable..."></textarea>
    </div>
    <div class="field">
      <label>Badge Text</label>
      <input type="text" id="heroBadge" placeholder="The UAE's Camel Leather House" />
    </div>
    <div class="field">
      <label>Announcement Bar</label>
      <input type="text" id="announcement" placeholder="A new chapter in Emirati craftsmanship..." />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Primary Button Text</label>
        <input type="text" id="heroBtnPrimary" placeholder="Explore the World of EBL" />
      </div>
      <div class="field">
        <label>Secondary Button Text</label>
        <input type="text" id="heroBtnGhost" placeholder="Watch the Story" />
      </div>
    </div>
  </div>

  <!-- About Section -->
  <div class="section-group">
    <h2>About Section</h2>
    <div class="field">
      <label>Section Label</label>
      <input type="text" id="aboutLabel" placeholder="Our Story" />
    </div>
    <div class="field">
      <label>Heading</label>
      <input type="text" id="aboutHeading" placeholder="A house built from desert and patience." />
    </div>
    <div class="field">
      <label>Body Paragraph 1</label>
      <textarea id="aboutBody1"></textarea>
    </div>
    <div class="field">
      <label>Body Paragraph 2</label>
      <textarea id="aboutBody2"></textarea>
    </div>
    <div class="field">
      <label>Image URL</label>
      <input type="text" id="aboutImg" placeholder="https://..." />
      <div class="hint">Paste a direct image URL (Unsplash, Cloudinary, etc.)</div>
    </div>
  </div>

  <!-- Collections Section -->
  <div class="section-group">
    <h2>Collections</h2>
    <div class="field">
      <label>Section Heading</label>
      <input type="text" id="collTitle" placeholder="Objects of Quiet Distinction" />
    </div>
    <div class="field">
      <label>Section Description</label>
      <textarea id="collDesc"></textarea>
    </div>
    <div id="collItems"></div>
  </div>

  <!-- Contact Section -->
  <div class="section-group">
    <h2>Contact Section</h2>
    <div class="field">
      <label>Heading</label>
      <input type="text" id="contactTitle" placeholder="Send an Enquiry" />
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="contactDesc"></textarea>
    </div>
  </div>

  <!-- Footer -->
  <div class="section-group">
    <h2>Footer</h2>
    <div class="field">
      <label>Tagline</label>
      <input type="text" id="footerTagline" placeholder="Where Emirati heritage meets enduring craftsmanship." />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Instagram URL</label>
        <input type="text" id="socialInsta" placeholder="https://instagram.com/ebl" />
      </div>
      <div class="field">
        <label>Twitter/X URL</label>
        <input type="text" id="socialTwitter" placeholder="https://twitter.com/ebl" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>LinkedIn URL</label>
        <input type="text" id="socialLinkedin" placeholder="https://linkedin.com/company/ebl" />
      </div>
      <div class="field">
        <label>Facebook URL</label>
        <input type="text" id="socialFacebook" placeholder="https://facebook.com/ebl" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>YouTube URL</label>
        <input type="text" id="socialYoutube" placeholder="https://youtube.com/@ebl" />
      </div>
      <div class="field">
        <label>WhatsApp Number</label>
        <input type="text" id="socialWhatsapp" placeholder="97125550188" />
      </div>
    </div>
    <div class="field">
      <label>Copyright Text</label>
      <input type="text" id="copyright" placeholder="© 2026 EBL. All rights reserved." />
    </div>
  </div>

  <!-- Phone & Email -->
  <div class="section-group">
    <h2>Contact Details</h2>
    <div class="field-row">
      <div class="field">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="+971 2 555 0188" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="text" id="email" placeholder="atelier@ebl.ae" />
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">Changes saved successfully</div>

<script>
// Default content — matches what's in index.html
var defaults = {
  heroH1: 'Born from the spirit of the Emirates.',
  heroSub: 'A quiet rebellion against the disposable. Twenty-six years of patient hands, sun-cured hides and master finishing — distilled into objects designed to outlast their maker.',
  heroBadge: "The UAE's Camel Leather House",
  announcement: 'A new chapter in Emirati craftsmanship — Reserve a private viewing',
  heroBtnPrimary: 'Explore the World of EBL',
  heroBtnGhost: 'Watch the Story',
  aboutLabel: 'Our Story',
  aboutHeading: 'A house built from desert and patience.',
  aboutBody1: 'EBL began in a single workshop on the edge of the Liwa desert — one master, three apprentices, and a conviction that the camel hide, long overlooked, deserved to stand among the world\'s great leathers. Today our artisans honour that first stitch in every piece they finish.',
  aboutBody2: 'We tan slowly with vegetable matter. We cut by hand. We refuse the shortcut. The result is not fashion. It is inheritance — leather that softens with each decade, carrying the hand of its maker and the warmth of the country that raised it.',
  aboutImg: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=1200',
  collTitle: 'Objects of Quiet Distinction',
  collDesc: 'Three families of heirloom camel leather — each drawn from the same sun-cured hides, each shaped for a different chapter of life.',
  contactTitle: 'Send an Enquiry',
  contactDesc: 'For private viewings, bespoke commissions, corporate programmes or simply a conversation about the craft — we welcome your message.',
  footerTagline: 'Where Emirati heritage meets enduring craftsmanship.',
  socialInsta: 'https://instagram.com/ebl',
  socialTwitter: 'https://twitter.com/ebl',
  socialLinkedin: 'https://linkedin.com/company/ebl',
  socialFacebook: 'https://facebook.com/ebl',
  socialYoutube: 'https://youtube.com/@ebl',
  socialWhatsapp: '97125550188',
  copyright: '© 2026 EBL. All rights reserved.',
  phone: '+971 2 555 0188',
  email: 'atelier@ebl.ae',
  collections: [
    { tag: 'Signature', name: 'Leather Bags', img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600', desc: 'Handcrafted from the finest sun-cured camel hides, each bag passes through six pairs of hands over as many weeks.', price: 'From AED 4,800' },
    { tag: 'Heritage', name: "Na'al Sandals", img: 'https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=600', desc: "The Na'al is our homage to the traditional Emirati sandal — reimagined in vegetable-tanned camel leather.", price: 'From AED 1,200' },
    { tag: 'Bespoke', name: 'Accessories', img: 'https://images.unsplash.com/photo-1627123424574-724758594e93?w=600', desc: 'Wallets, cardholders, journal covers and bespoke desk sets — each piece cut from a single hide.', price: 'From AED 680' }
  ]
};

function getContent() {
  try { return JSON.parse(localStorage.getItem('ebl_content')) || {}; } catch(e) { return {}; }
}

function loadFields() {
  var saved = Object.assign({}, defaults, getContent());
  Object.keys(saved).forEach(function(key) {
    if (key === 'collections') return;
    var el = document.getElementById(key);
    if (el) el.value = saved[key] || '';
  });
  renderCollections(saved.collections || defaults.collections);
}

function renderCollections(items) {
  var wrap = document.getElementById('collItems');
  wrap.innerHTML = '';
  items.forEach(function(item, i) {
    wrap.innerHTML += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;">' +
      '<div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:12px;letter-spacing:0.1em;">COLLECTION ' + (i+1) + '</div>' +
      '<div class="field-row">' +
        '<div class="field"><label>Tag</label><input type="text" id="coll_tag_'+i+'" value="'+item.tag+'" /></div>' +
        '<div class="field"><label>Name</label><input type="text" id="coll_name_'+i+'" value="'+item.name+'" /></div>' +
      '</div>' +
      '<div class="field"><label>Image URL</label><input type="text" id="coll_img_'+i+'" value="'+item.img+'" /></div>' +
      '<div class="field"><label>Description</label><textarea id="coll_desc_'+i+'">'+item.desc+'</textarea></div>' +
      '<div class="field"><label>Price</label><input type="text" id="coll_price_'+i+'" value="'+item.price+'" /></div>' +
    '</div>';
  });
}

function gatherData() {
  var data = {};
  Object.keys(defaults).forEach(function(key) {
    if (key === 'collections') return;
    var el = document.getElementById(key);
    if (el) data[key] = el.value;
  });
  data.collections = [];
  for (var i = 0; i < 3; i++) {
    data.collections.push({
      tag: (document.getElementById('coll_tag_'+i) || {}).value || '',
      name: (document.getElementById('coll_name_'+i) || {}).value || '',
      img: (document.getElementById('coll_img_'+i) || {}).value || '',
      desc: (document.getElementById('coll_desc_'+i) || {}).value || '',
      price: (document.getElementById('coll_price_'+i) || {}).value || ''
    });
  }
  return data;
}

function saveAll() {
  localStorage.setItem('ebl_content', JSON.stringify(gatherData()));
  document.getElementById('statusDot').className = 'status-dot saved';
  showToast('Changes saved — refresh the site to see updates');
}

function resetAll() {
  if (!confirm('Reset all content to defaults? This cannot be undone.')) return;
  localStorage.removeItem('ebl_content');
  loadFields();
  showToast('Content reset to defaults');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// Track unsaved changes
document.addEventListener('input', function() {
  document.getElementById('statusDot').className = 'status-dot unsaved';
});

loadFields();
</script>
</body>
</html>
